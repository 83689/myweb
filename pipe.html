<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockPipe 烟斗文化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/2c0951c3535446e69357ff1379806167.png');
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            background-color: #f8f5e6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        .qrcode-card {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(8px);
            text-align: center;
            max-width: 90vw;
        }

        .qrcode-img {
            width: 280px;
            height: 280px;
            border-radius: 8px;
            margin: 1rem 0;
            border: 2px solid #e0e0e0;
        }

        .card-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            font-family: 'Segoe Script', 'Brush Script MT', 'KaiTi', cursive;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 1rem;
            color: #666;
            margin-top: 0.5rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .qrcode-img {
                width: 220px;
                height: 220px;
            }
            .qrcode-card {
                padding: 1.5rem;
            }
            .card-title {
                font-size: 1.5rem;
            }
            .card-desc {
                font-size: 0.9rem;
            }
        }

        @media (min-width: 1200px) {
            .qrcode-img {
                width: 320px;
                height: 320px;
            }
            .card-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="qrcode-card">
        <h1 class="card-title">RockPipe</h1>
        <img 
            src="https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=https://example.com&bgcolor=f8f5e6&color=000000&margin=1" 
            alt="RockPipe 烟斗文化 二维码" 
            class="qrcode-img"
        >
        <p class="card-desc">扫码探索烟斗文化 | RockPipe 官方账号</p>
    </div>
</body>
</html>
