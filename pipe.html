<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码页面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:#f6f6f6;
  background-image:url('https://picsum.photos/1920/1080');
  background-size:cover;
  background-position:center;
  font-family:sans-serif;
}
.card{
  background:rgba(255,255,255,0.95);
  padding:30px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}
.card img{
  width:260px;
  height:260px;
  display:block;
  margin:20px auto;
}
.card h2{
  margin-bottom:10px;
}
</style>
</head>
<body>
<div class="card">
  <h2>扫码添加我</h2>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=https://github.com" alt="二维码">
  <p>扫码直达</p>
</div>
</body>
</html>
