<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockPipe - 烟斗文化</title>
    <style>
        /* 核心样式变量 */
        :root {
            --primary-color: #4a2c2a; /* 深木色 */
            --accent-color: #d4a373;  /* 琥珀色 */
            --bg-blur: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Noto Serif SC', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        /* 动态模糊背景 */
        .background {
            position: fixed;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: url('rockpipe-logo.png') no-repeat center center;
            background-size: cover;
            filter: blur(var(--bg-blur)) brightness(0.4);
            z-index: -1;
        }

        /* 主体卡片 */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
            animation: fadeIn 1.2s ease-out;
        }

        /* Logo 样式 */
        .logo {
            width: 180px;
            margin-bottom: 30px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        /* 二维码容器 */
        .qr-wrapper {
            background: white;
            padding: 15px;
            border-radius: 18px;
            display: inline-block;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .qr-wrapper:hover {
            transform: scale(1.02);
        }

        .qr-code {
            display: block;
            width: 200px;
            height: 200px;
            object-fit: contain;
        }

        /* 文字装饰 */
        h1 {
            color: var(--accent-color);
            font-size: 1.2rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* 入场动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .card { padding: 30px 20px; }
            .qr-code { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="card">
        <img src="rockpipe-logo.png" alt="RockPipe Logo" class="logo">
        
        <div class="qr-wrapper">
            <img src="qrcode.png" alt="QR Code" class="qr-code">
        </div>

        <h1>RockPipe</h1>
        <p>品味烟斗艺术 · 享受慢调生活</p>
    </div>

</body>
</html>
