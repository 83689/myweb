<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RockPipe RockPipe烟斗文化</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            position: relative; /* 给背景伪元素做定位基准 */
            background-color: #f8f5e6; /* 匹配logo的米白色背景 */
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden; /* 防止模糊背景溢出出现滚动条 */
        }

        /* 🔹 背景模糊层：单独做背景，只模糊背景，不影响中间内容 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 背景图：和HTML同目录，相对路径，永不404 */
            background-image: url('rockpipe-logo.png');
            background-size: contain;
            background-position: center center;
            background-repeat: no-repeat;
            /* 模糊效果：数值越大越模糊，可自行调整（5px/8px/12px） */
            filter: blur(8px);
            z-index: -1; /* 放在最底层，绝对不遮挡中间二维码 */
        }

        /* 二维码卡片容器（完全保留你原来的样式） */
        .qrcode-card {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(8px);
            text-align: center;
            max-width: 90vw;
        }

        /* 🔹 本地二维码：直接替换图片即可，不用改代码 */
        .qrcode-img {
            width: 280px;
            height: 280px;
            border-radius: 8px;
            margin: 1rem 0;
            border: 2px solid #e0e0e0;
        }

        /* 标题样式（完全保留你原来的手写风格） */
        .card-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
            font-family: 'Segoe Script', 'Brush Script MT', 'KaiTi', cursive;
            letter-spacing: 1px;
        }

        /* 说明文字 */
        .card-desc {
            font-size: 1rem;
            color: #666;
            margin-top: 0.5rem;
            line-height: 1.5;
        }

        /* 📱 移动端适配（完全保留） */
        @media (max-width: 768px) {
            .qrcode-img {
                width: 220px;
                height: 220px;
            }
            .qrcode-card {
                padding: 1.5rem;
            }
            .card-title {
                font-size: 1.5rem;
            }
            .card-desc {
                font-size: 0.9rem;
            }
        }

        /* 🖥️ 大屏适配（完全保留） */
        @media (min-width: 1200px) {
            .qrcode-img {
                width: 320px;
                height: 320px;
            }
            .card-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="qrcode-card">
        <h1 class="card-title">RockPipe</h1>
        <!-- 🔹 本地二维码：把你的二维码命名为qrcode.png，和HTML同目录自动显示 -->
        <img 
            src="qrcode.png" 
            alt="RockPipe 烟斗文化 二维码" 
            class="qrcode-img"
        >
        <p class="card-desc">扫码探索烟斗文化 | RockPipe 官方账号</p>
    </div>
</body>
</html>
