<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RockPipe</title>
    <style>
        :root {
            --gold-light: #f1d27b;
            --gold-main: #d4af37;
            --gold-dark: #aa8928;
            --bg-dark: #0f0f0f;
            --card-bg: rgba(25, 25, 25, 0.45); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: 
                linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 100%),
                url('rockpipe-logo.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            filter: blur(8px);
            z-index: -1;
        }

        .qrcode-card {
            background-color: var(--card-bg);
            padding: 2rem 1.5rem;
            border-radius: 18px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 
                        inset 0 0 15px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            text-align: center;
            max-width: 320px;
            width: 90%;
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-title-img {
            display: block;
            width: 180px;
            height: auto;
            margin: 0 auto 1rem auto;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .qr-frame {
            position: relative;
            display: inline-block;
            margin: 0 0 1rem 0; 
            padding: 8px;
            background: linear-gradient(145deg, rgba(26,26,26,0.8), rgba(0,0,0,0.8));
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .qr-frame::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 1px solid var(--gold-main);
            border-radius: 12px;
            opacity: 0.4;
            pointer-events: none;
        }

        .qrcode-img {
            display: block;
            width: 220px; 
            height: 220px;
            border-radius: 4px;
            filter: brightness(1.05);
        }

        .card-desc {
            font-size: 0.95rem;
            color: rgba(212, 175, 55, 0.8);
            margin-top: 0.3rem;
            letter-spacing: 1px;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 480px) {
            body::before {
                background-size: 150% auto; 
                background-position: center 30%;
            }
            .qrcode-img { width: 200px; height: 200px; }
            .card-title-img { width: 160px; }
            .card-desc { font-size: 0.85rem; }
            .qrcode-card { padding: 1.8rem 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="qrcode-card">
        <img src="title.png" alt="RockPipe" class="card-title-img">
        <div class="qr-frame">
            <img src="qrcode.png" alt="QR Code" class="qrcode-img">
        </div>
        <p class="card-desc">扫码探索烟斗文化 | RockPipe 官方账号</p>
    </div>
</body>
</html>
