<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RockPipe</title>
    <style>
        :root {
            --gold-light: #f1d27b;
            --gold-main: #d4af37;
            --gold-dark: #aa8928;
            --bg-dark: #0f0f0f;
            --card-bg: rgba(25, 25, 25, 0.45); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: 
                linear-gradient(135deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.3) 100%),
                url('rockpipe-logo.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            filter: blur(8px);
            z-index: -1;
        }

        .qrcode-card {
            background-color: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 
                        inset 0 0 20px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: cardAppear 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-title {
            font-size: 3.2rem;
            font-weight: 700;
            font-family: 'Segoe Script', 'Brush Script MT', 'KaiTi', cursive;
            margin-bottom: 1rem; 
            background: linear-gradient(to bottom, var(--gold-light), var(--gold-main), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .qr-frame {
            position: relative;
            display: inline-block;
            margin: 0 0 1.2rem 0; 
            padding: 10px;
            background: linear-gradient(145deg, rgba(26,26,26,0.8), rgba(0,0,0,0.8));
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .qr-frame::before {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border: 1px solid var(--gold-main);
            border-radius: 14px;
            opacity: 0.4;
            pointer-events: none;
        }

        .qrcode-img {
            display: block;
            width: 300px; 
            height: 300px;
            border-radius: 4px;
            filter: brightness(1.05);
        }

        .card-desc {
            font-size: 1.1rem;
            color: rgba(212, 175, 55, 0.8);
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 480px) {
            .qrcode-img { width: 240px; height: 240px; }
            .card-title { font-size: 2.8rem; }
            .card-desc { font-size: 1rem; }
            .qrcode-card { padding: 2.5rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="qrcode-card">
        <h1 class="card-title">RockPipe</h1>
        <div class="qr-frame">
            <img src="qrcode.png" alt="RockPipe" class="qrcode-img">
        </div>
        <p class="card-desc">扫码探索烟斗文化 | RockPipe 官方账号</p>
    </div>
</body>
</html>
